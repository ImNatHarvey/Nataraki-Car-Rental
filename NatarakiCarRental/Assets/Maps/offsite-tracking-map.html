<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nataraki Offsite Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            height: 100%;
            width: 100%;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        #map {
            background: #eef2ff;
        }

        .offline-note {
            position: absolute;
            z-index: 1000;
            left: 14px;
            bottom: 14px;
            max-width: 320px;
            padding: 10px 12px;
            border: 1px solid #bfdbfe;
            background: rgba(255, 255, 255, 0.94);
            color: #334155;
            border-radius: 6px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
            font-size: 13px;
        }

        .pulse-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #2563eb;
            border: 3px solid #ffffff;
            box-shadow: 0 0 0 rgba(37, 99, 235, 0.45);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45);
                transform: scale(0.95);
            }
            70% {
                box-shadow: 0 0 0 16px rgba(37, 99, 235, 0);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="offline-note">Map tiles require internet connection. Tracking data is loaded from the local database.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const defaultCenter = [14.5995, 120.9842];
        const map = L.map('map', { zoomControl: true }).setView(defaultCenter, 10);
        let vehicleMarker = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const vehicleIcon = L.divIcon({
            className: '',
            html: '<div class="pulse-marker"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -12]
        });

        let simulationRoute = null;

        window.setSimulationRoute = function (points) {
            if (simulationRoute) {
                map.removeLayer(simulationRoute);
            }
            if (points && points.length > 0) {
                simulationRoute = L.polyline(points, { color: '#3b82f6', weight: 4, opacity: 0.6, dashArray: '8, 8' }).addTo(map);
            }
        };

        window.setVehicleLocation = function (lat, lng, label) {
            const position = [lat, lng];
            const safeLabel = label || 'Selected vehicle';
            const popup = `<strong>${safeLabel}</strong><br/>Latitude: ${lat.toFixed(7)}<br/>Longitude: ${lng.toFixed(7)}`;

            if (!vehicleMarker) {
                vehicleMarker = L.marker(position, { icon: vehicleIcon }).addTo(map);
                map.setView(position, 15, { animate: true });
            } else {
                vehicleMarker.setLatLng(position);
                
                // Pan to marker to keep it centered without resetting zoom level
                map.panTo(position, { animate: true, duration: 1.0 });
            }

            vehicleMarker.bindPopup(popup);
        };

        window.clearVehicleMarker = function () {
            if (vehicleMarker) {
                map.removeLayer(vehicleMarker);
                vehicleMarker = null;
            }
            if (simulationRoute) {
                map.removeLayer(simulationRoute);
                simulationRoute = null;
            }
            map.setView(defaultCenter, 10);
        };
    </script>
</body>
</html>
